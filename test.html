<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayMogo - Test Mobile</title>

<style>
html,body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

.wrapper{
    width:min(100%,900px);
    margin:40px auto;
    padding:10px;
}

.player{
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
}

.player iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>

<body>

<div class="wrapper">

<h2>PlayMogo - Compatibilité Mobile</h2>

<div class="player">

<iframe
src="https://playmogo.com/e/rvheyqz4yp8k"
title="PlayMogo"
frameborder="0"
scrolling="no"
loading="eager"
allowfullscreen
webkitallowfullscreen
mozallowfullscreen
playsinline
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; fullscreen; web-share">
</iframe>

</div>

<p>
Test de compatibilité mobile.
</p>

</div>

</body>
</html>
